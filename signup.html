<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synergy Sphere</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!-- Nav Bar -->

  <nav>
    <div class="logo">
      <h1>Synergy Sphere</h1>
    </div>
    <ul id="menuList">
      <li><a href="./home/home.html">Home</a></li>
      <li><a href="">About</a></li>
      <li><a href="">Services</a></li>
      <li><a href="">Product</a></li>
      <li><a href="">Contact</a></li>
    </ul>
    <div class="menu-icon">
      <i class="fa-solid fa-bars" onclick="toggleMenu()"></i>
    </div>
  </nav>

  <!-- Sign up -->

  <div class="wrapper">
    <h1>Sign Up</h1>
    <form action="#">
      <input type="text" placeholder="Name">
      <ion-icon name="person-outline" class="icon"></ion-icon>
      <input type="password" placeholder="Password">
      <ion-icon name="lock-closed-outline" class="icon"></ion-icon>
      <input type="password" placeholder="Re-Enter Password">
      <input type="text" placeholder="Username">
    </form>
    <div class="terms">
      <input type="checkbox" id="checkbox">
      <label for="checkbox">I agree to these <a href="#">Terms & Conditions</a></label>
    </div>
    <button>Sign Up</button>
    <div class="social-login">
      <div class="social-login-box">
        <ion-icon name="logo-google"></ion-icon>
      </div>
      <div class="social-login-box">
        <ion-icon name="logo-github"></ion-icon>
      </div>
      <div class="social-login-box">
        <ion-icon name="logo-linkedin"></ion-icon>
      </div>
    </div>
    <div class="member">
      Already a member? <a href="./index.html">Login Here</a>
    </div>
  </div>

  <script src="https://kit.fontawesome.com/f8e1a90484.js" crossorigin="anonymous"></script>
  <script src="script.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
